<ul style="list-style: none; display: flex; flex-direction: column; gap: 12px; padding: 0;">
  {% for profile in online_users %}
    <li style="display: flex; align-items: center; justify-content: space-between; padding: 12px 18px; background: rgba(255, 255, 255, 0.03); border-radius: 10px; border: 1px solid var(--glass-border);">
        <span style="font-weight: 500; font-size: 1.05rem;">👤 {{ profile.user.username }}</span>
        <span class="status {% if profile.is_online %}green{% else %}red{% endif %}">
            ● {% if profile.is_online %}Online{% else %}Offline{% endif %}
        </span>
    </li>
  {% empty %}
    <li style="text-align: center; color: var(--text-muted); padding: 30px; background: rgba(255, 255, 255, 0.02); border-radius: 10px; border: 1px dashed var(--glass-border);">
        No users online
    </li>
  {% endfor %}
</ul>
